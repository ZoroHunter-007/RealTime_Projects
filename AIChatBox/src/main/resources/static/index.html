<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* ===== RESET ===== */
* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: #0f172a;
  color: #e5e7eb;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
header {
  padding: 16px;
  text-align: center;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  font-size: 18px;
  font-weight: 600;
}

/* ===== CHAT AREA ===== */
.chat-container {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ===== MESSAGE BUBBLES ===== */
.message {
  max-width: 75%;
  padding: 12px 14px;
  border-radius: 14px;
  line-height: 1.4;
  white-space: pre-wrap;
}

/* AI */
.message.ai {
  background: #1e293b;
  align-self: flex-start;
}

/* USER */
.message.user {
  background: #2563eb;
  align-self: flex-end;
}

/* ===== INPUT AREA ===== */
.input-area {
  display: flex;
  padding: 14px;
  gap: 10px;
  border-top: 1px solid #1e293b;
  background: #020617;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 15px;
  background: #020617;
  color: #e5e7eb;
  border: 1px solid #1e293b;
}

button {
  padding: 0 18px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}
</style>
</head>

<body>

<header>🤖 AI Chat</header>

<div id="chat" class="chat-container"></div>

<div class="input-area">
  <input id="input" placeholder="Message AI..." />
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "message ai";
  typing.textContent = "AI is typing...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  fetch("http://localhost:8081/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  })
  .then(res => res.text())
  .then(reply => {
    typing.remove();
    addMessage(reply, "ai");
  })
  .catch(() => {
    typing.textContent = "❌ Error connecting to AI";
  });
}

// Send on Enter
input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
