<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My AI Chat 🤖 (llama3)</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  width: 100vw;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: #e5e7eb;
}

/* ================= APP ================= */
.chat-app {
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
}

/* ================= HEADER ================= */
.chat-header {
  padding: 18px 24px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  font-size: 20px;
  font-weight: 600;
}

/* ================= CHAT BODY ================= */
.chat-body {
  flex: 1;
  padding: 32px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

/* ================= MESSAGE ================= */
.message {
  display: flex;
  gap: 14px;
  max-width: 100%;
}

.message.user {
  justify-content: flex-end;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  background: #1e293b;
  flex-shrink: 0;
}

.user .avatar {
  background: #2563eb;
}

.bot .avatar {
  background: #334155;
}

.bubble {
  max-width: 85%;
  padding: 16px 18px;
  border-radius: 16px;
  font-size: 16px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.user .bubble {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  border-bottom-right-radius: 6px;
}

.bot .bubble {
  background: #1e293b;
  color: #e5e7eb;
  border-bottom-left-radius: 6px;
}

.time {
  font-size: 12px;
  opacity: 0.5;
  margin-top: 6px;
}

/* ================= INPUT ================= */
.chat-input {
  padding: 20px;
  background: #020617;
  border-top: 1px solid #1e293b;
  display: flex;
  gap: 14px;
}

.chat-input input {
  flex: 1;
  padding: 16px 18px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
}

.chat-input button {
  padding: 16px 26px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: #22c55e;
  color: black;
  font-weight: 600;
}

.chat-input button:hover {
  background: #16a34a;
}

/* ================= SCROLL ================= */
.chat-body::-webkit-scrollbar {
  width: 8px;
}
.chat-body::-webkit-scrollbar-thumb {
  background: #334155;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="chat-app">
  <div class="chat-header">My AI Chat 🤖 (llama3)</div>

  <div class="chat-body" id="chatBody"></div>

  <div class="chat-input">
    <input id="userInput" placeholder="Ask something…" />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const chatBody = document.getElementById("chatBody");
const input = document.getElementById("userInput");

function timeNow() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = "message " + sender;

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = sender === "user" ? "🧑" : "🤖";

  const wrap = document.createElement("div");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  const time = document.createElement("div");
  time.className = "time";
  time.textContent = timeNow();

  wrap.appendChild(bubble);
  wrap.appendChild(time);

  if (sender === "user") {
    msg.appendChild(wrap);
    msg.appendChild(avatar);
  } else {
    msg.appendChild(avatar);
    msg.appendChild(wrap);
  }

  chatBody.appendChild(msg);
  chatBody.scrollTop = chatBody.scrollHeight;

  return bubble;
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  // User message
  addMessage(message, "user");
  input.value = "";

  // New bot bubble for THIS request only
  const botBubble = addMessage("", "bot");

  const response = await fetch("http://localhost:8081/api/ollama/chat-stream", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");

  let lastChar = "";

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;

    let chunk = decoder.decode(value, { stream: true });

    // Remove SSE formatting
    chunk = chunk
      .replace(/^data:\s*/gm, "")
      .replace(/\n\n/g, "");

    // 🔥 SMART SPACING FIX
    const startsWithLetter = /^[a-zA-Z]/.test(chunk);
    const lastIsLetter = /[a-zA-Z]$/.test(lastChar);

    if (
      lastChar &&
      lastIsLetter &&
      startsWithLetter &&
      chunk.length > 1
    ) {
      botBubble.textContent += " ";
    }

    botBubble.textContent += chunk;
    lastChar = botBubble.textContent.slice(-1);

    chatBody.scrollTop = chatBody.scrollHeight;
  }


}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
