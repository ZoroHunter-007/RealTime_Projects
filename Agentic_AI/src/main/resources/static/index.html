<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>



<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🤖 Agentic AI</h2>
        <button class="new-chat">+ New Chat</button><br>
        
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">

        <div id="chat-box" class="chat-box">
            <!-- messages -->
        </div>

        <div class="chat-input">
            <textarea id="userInput" placeholder="Message Agentic AI..."></textarea>
            <button id="sendBtn" onclick="sendMessage()">➤</button>

        </div>

    </main>

</div>


<script src="script.js"></script>
</body>
</html>
